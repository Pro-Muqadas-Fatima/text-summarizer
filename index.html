<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer - Extract & Abstractive</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(rgba(100, 150, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(100, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            border-bottom: 1px solid rgba(100, 150, 255, 0.1);
            padding: 2rem;
            backdrop-filter: blur(10px);
            background: rgba(15, 15, 30, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-title h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-title i {
            font-size: 1.75rem;
            color: #6496ff;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: #6496ff;
            border-bottom-color: #6496ff;
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Tab Content */
        .tab-content {
            animation: fadeIn 0.3s ease;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 1.25rem;
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 0.75rem;
            background: rgba(30, 30, 50, 0.5);
            color: #fff;
            font-size: 0.95rem;
            line-height: 1.6;
            font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 20px rgba(100, 150, 255, 0.05);
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.4);
            background: rgba(30, 30, 50, 0.7);
        }

        .char-count {
            margin: 0.5rem 0 0 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Controls Grid */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .range-container {
            flex: 1;
        }

        .range-value {
            color: #6496ff;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(100, 150, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6496ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.7);
            width: 20px;
            height: 20px;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6496ff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.7);
            width: 20px;
            height: 20px;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: #6496ff;
            font-size: 1rem;
            font-weight: 600;
            gap: 0.75rem;
            justify-content: center;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5580ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(100, 150, 255, 0.2);
        }

        .btn-primary:disabled {
            background: rgba(100, 150, 255, 0.3);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-secondary {
            border: 1px solid rgba(100, 150, 255, 0.3);
            background: transparent;
            color: #6496ff;
            flex: 1;
        }

        .btn-secondary:hover {
            background: rgba(100, 150, 255, 0.1);
        }

        .btn-copy, .btn-download {
            border: 1px solid rgba(100, 150, 255, 0.2);
            background: transparent;
            color: #6496ff;
            margin-top: 1rem;
        }

        .btn-copy:hover, .btn-download:hover {
            background: rgba(100, 150, 255, 0.1);
        }

        .btn-copy.copied {
            background: rgba(100, 255, 150, 0.2);
            color: #64ff96;
            border-color: rgba(100, 255, 150, 0.3);
        }

        .btn-download {
            width: 100%;
            justify-content: center;
        }

        /* Loading Spinner */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .score-card {
            padding: 1.5rem;
            border-radius: 0.75rem;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .score-info {
            flex: 1;
        }

        .score-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .score-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #6496ff;
            margin: 0.5rem 0 0 0;
        }

        .score-icon {
            font-size: 1.5rem;
            color: rgba(100, 150, 255, 0.5);
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(100, 150, 255, 0.2);
            background: rgba(30, 30, 50, 0.5);
            box-shadow: inset 0 0 20px rgba(100, 150, 255, 0.05);
        }

        .summary-card h3 {
            margin: 0 0 1rem 0;
            font-size: 1rem;
            font-weight: 600;
        }

        .summary-card p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(100, 150, 255, 0.1);
            padding: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 4rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-title h1 {
                font-size: 1.5rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="header-title">
                <i class="fas fa-bolt"></i>
                <h1>AI Text Summarizer</h1>
            </div>
            <p class="header-subtitle">Extract key insights or generate human-like summaries instantly</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('input')">
                <i class="fas fa-pen"></i> Input
            </button>
            <button class="tab-btn" onclick="switchTab('results')">
                <i class="fas fa-chart-bar"></i> Results
            </button>
        </div>

        <!-- Input Tab -->
        <div id="input-tab" class="tab-content active">
            <!-- Text Input -->
            <div class="form-group">
                <label for="inputText">Enter or paste your text</label>
                <textarea id="inputText" placeholder="Paste long text here... or load a sample"></textarea>
                <p class="char-count">
                    <span id="wordCount">0</span> words • <span id="charCount">0</span> characters
                </p>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="range-container">
                    <label for="summaryLength">
                        Summary Length: <span class="range-value" id="lengthValue">3</span> sentences
                    </label>
                    <input type="range" id="summaryLength" min="1" max="10" value="3">
                </div>
                <div style="display: flex; gap: 1rem; align-items: flex-end;">
                    <button class="btn btn-secondary" onclick="loadSample()">
                        <i class="fas fa-file-import"></i> Load Sample
                    </button>
                </div>
            </div>

            <!-- Action Button -->
            <button id="summarizeBtn" class="btn btn-primary" onclick="summarize()">
                <i class="fas fa-bolt"></i> Summarize Now
            </button>
        </div>

        <!-- Results Tab -->
        <div id="results-tab" class="tab-content">
            <div id="resultsContainer"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>AI Text Summarizer • Extract & Abstractive Intelligence • © 2025</p>
    </footer>

    <script>
        // DOM Elements
        const inputText = document.getElementById('inputText');
        const summaryLength = document.getElementById('summaryLength');
        const lengthValue = document.getElementById('lengthValue');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const resultsContainer = document.getElementById('resultsContainer');

        // Update length display
        summaryLength.addEventListener('input', (e) => {
            lengthValue.textContent = e.target.value;
        });

        // Update character/word count
        inputText.addEventListener('input', () => {
            const words = inputText.value.split(/\s+/).filter(w => w).length;
            const chars = inputText.value.length;
            wordCount.textContent = words;
            charCount.textContent = chars;
        });

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        // Load sample text
        function loadSample() {
            const sample = `Artificial Intelligence is transforming industries by automating tasks and improving efficiency. 
It helps businesses make better decisions using data analysis. Machine learning models allow systems to learn from data. 
Deep learning is a subset of AI that uses neural networks. AI is widely used in healthcare, finance, and education. 
It improves productivity and reduces human effort significantly. The future of AI lies in developing more interpretable and ethical systems. 
Organizations are investing heavily in AI research and development to stay competitive in the digital age.`;
            
            inputText.value = sample;
            inputText.dispatchEvent(new Event('input'));
        }

        // Extractive Summarization
        function extractiveSummarize(text, topN) {
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            if (sentences.length <= topN) return text;

            const scored = sentences.map((sent, idx) => {
                const words = sent.toLowerCase().match(/\b\w+\b/g) || [];
                const commonWords = ['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'is', 'was', 'are'];
                const uniqueWords = words.filter(w => !commonWords.includes(w)).length;
                return { sent: sent.trim(), score: uniqueWords, idx };
            });

            const topSentences = scored
                .sort((a, b) => b.score - a.score)
                .slice(0, topN)
                .sort((a, b) => a.idx - b.idx);

            return topSentences.map(s => ` ${s.sent}`).join(' ');
        }

        // Abstractive Summarization
        function abstractiveSummarize(text) {
            if (text.split(/\s+/).length < 50) return text;

            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            const words = text.toLowerCase().match(/\b\w+\b/g) || [];
            const wordFreq = {};
            
            words.forEach(word => {
                if (word.length > 3) {
                    wordFreq[word] = (wordFreq[word] || 0) + 1;
                }
            });

            const scored = sentences.map((sent, idx) => {
                const sentWords = sent.toLowerCase().match(/\b\w+\b/g) || [];
                const score = sentWords.reduce((acc, w) => acc + (wordFreq[w] || 0), 0);
                return { sent: sent.trim(), score, idx };
            });

            const numSentences = Math.max(1, Math.min(3, Math.ceil(sentences.length / 3)));
            const summary = scored
                .sort((a, b) => b.score - a.score)
                .slice(0, numSentences)
                .sort((a, b) => a.idx - b.idx)
                .map(s => s.sent)
                .join(' ');

            return summary || text.substring(0, 100) + '...';
        }

        // Calculate ROUGE-like scores
        function calculateRougeScores(original, extractive, abstractive) {
            const origWords = new Set(original.toLowerCase().match(/\b\w+\b/g) || []);
            
            const calcOverlap = (text) => {
                const textWords = new Set(text.toLowerCase().match(/\b\w+\b/g) || []);
                const intersection = [...textWords].filter(w => origWords.has(w)).length;
                return ((intersection / origWords.size) * 100).toFixed(1);
            };

            return {
                extractive: parseFloat(calcOverlap(extractive)),
                abstractive: parseFloat(calcOverlap(abstractive))
            };
        }

        // Main summarize function
        function summarize() {
            const text = inputText.value.trim();
            if (!text) {
                alert('Please enter or load text to summarize');
                return;
            }

            summarizeBtn.disabled = true;
            summarizeBtn.innerHTML = '<i class="fas fa-spinner spinner"></i> Summarizing...';

            setTimeout(() => {
                const topN = parseInt(summaryLength.value);
                const extractive = extractiveSummarize(text, topN);
                const abstractive = abstractiveSummarize(text);
                const scores = calculateRougeScores(text, extractive, abstractive);

                displayResults(extractive, abstractive, scores);
                
                // Switch to results tab
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                document.getElementById('results-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');

                summarizeBtn.disabled = false;
                summarizeBtn.innerHTML = '<i class="fas fa-bolt"></i> Summarize Now';
            }, 800);
        }

        // Display results
        function displayResults(extractive, abstractive, scores) {
            resultsContainer.innerHTML = `
                <!-- ROUGE Scores -->
                <div class="results-grid">
                    <div class="score-card">
                        <div class="score-info">
                            <p class="score-label">Extractive</p>
                            <p class="score-value">${scores.extractive}%</p>
                        </div>
                        <i class="fas fa-brain score-icon"></i>
                    </div>
                    <div class="score-card">
                        <div class="score-info">
                            <p class="score-label">Abstractive</p>
                            <p class="score-value">${scores.abstractive}%</p>
                        </div>
                        <i class="fas fa-brain score-icon"></i>
                    </div>
                </div>

                <!-- Summary Results -->
                <div class="summary-grid">
                    <div class="summary-card">
                        <h3>🟢 Extractive Summary</h3>
                        <p>${extractive}</p>
                        <button class="btn btn-copy" onclick="copyToClipboard('${extractive.replace(/'/g, "\\'")}', this)">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                    <div class="summary-card">
                        <h3>🔵 Abstractive Summary</h3>
                        <p>${abstractive}</p>
                        <button class="btn btn-copy" onclick="copyToClipboard('${abstractive.replace(/'/g, "\\'")}', this)">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                </div>

                <!-- Download Button -->
                <button class="btn btn-download" onclick="downloadResults('${inputText.value.replace(/"/g, '\\"').replace(/'/g, "\\'")}', '${extractive.replace(/"/g, '\\"').replace(/'/g, "\\'")}', '${abstractive.replace(/"/g, '\\"').replace(/'/g, "\\'")}')" style="width: 100%; justify-content: center;">
                    <i class="fas fa-download"></i> Download Results as .txt
                </button>
            `;
        }

        // Copy to clipboard
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            btn.classList.add('copied');
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('copied');
            }, 2000);
        }

        // Download results
        function downloadResults(original, extractive, abstractive) {
            const content = `AI TEXT SUMMARIZER RESULTS\n${'='.repeat(50)}\n\nORIGINAL TEXT:\n${original}\n\n${'='.repeat(50)}\nEXTRACTIVE SUMMARY:\n${extractive}\n\n${'='.repeat(50)}\nABSTRACTIVE SUMMARY:\n${abstractive}`;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'summarizer_results.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
